<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alamine Fact - ERP Premium</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icônes Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dark-theme">
    <div class="app-container">
        <!-- Sidebar (Menu hamburger sur mobile via CSS/JS) -->
        <button id="mobile-menu-btn" class="mobile-menu-btn"><i data-lucide="menu"></i></button>
        
        <aside class="sidebar glass-panel" id="sidebar">
            <div class="logo-container">
                <i data-lucide="glasses" class="logo-icon"></i>
                <h1 class="logo-text">Alamine<span>Fact</span></h1>
            </div>
            
            <nav class="nav-menu">
                <a href="#" class="nav-item active" data-view="dashboard" data-title="Tableau de bord">
                    <i data-lucide="home"></i><span>Tableau de bord</span>
                </a>
                <a href="#" class="nav-item" data-view="invoices" data-title="Factures & Devis">
                    <i data-lucide="dollar-sign"></i><span>Factures & Devis</span>
                </a>
                <a href="#" class="nav-item" data-view="sales" data-title="Point de Vente">
                    <i data-lucide="shopping-cart"></i><span>Point de Vente</span>
                </a>
                <a href="#" class="nav-item" data-view="clients" data-title="Clients">
                    <i data-lucide="users"></i><span>Clients</span>
                </a>
                <a href="#" class="nav-item" data-view="prescriptions" data-title="Prescriptions">
                    <i data-lucide="eye"></i><span>Prescriptions</span>
                </a>
                <a href="#" class="nav-item" data-view="agenda" data-title="Rendez-vous">
                    <i data-lucide="calendar"></i><span>Rendez-vous</span>
                </a>
                <a href="#" class="nav-item" data-view="stock" data-title="Stock Optique">
                    <i data-lucide="package"></i><span>Stock Optique</span>
                </a>
                <a href="#" class="nav-item" data-view="workshop" data-title="Atelier">
                    <i data-lucide="factory"></i><span>Atelier</span>
                </a>
                <a href="#" class="nav-item" data-view="suppliers" data-title="Fournisseurs">
                    <i data-lucide="truck"></i><span>Fournisseurs</span>
                </a>
                <a href="#" class="nav-item" data-view="reports" data-title="Rapports">
                    <i data-lucide="bar-chart-2"></i><span>Rapports</span>
                </a>
                <a href="#" class="nav-item" data-view="settings" data-title="Paramètres">
                    <i data-lucide="settings"></i><span>Paramètres</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Header -->
            <header class="top-header glass-panel">
                <div class="breadcrumb" id="breadcrumb">
                    <i data-lucide="home"></i> <span>Tableau de bord</span>
                </div>
                <div class="global-search">
                    <i data-lucide="search"></i>
                    <input type="text" placeholder="Rechercher un client, une facture ou une prescription...">
                </div>
                <div class="header-actions">
                    <div class="lang-selector">
                        <span>FR</span> <i data-lucide="chevron-down"></i>
                    </div>
                    <button class="icon-btn"><i data-lucide="bell"></i><span class="badge">3</span></button>
                    <div class="profile-menu">
                        <img src="https://ui-avatars.com/api/?name=A&background=3B82F6&color=fff" alt="User" class="avatar">
                        <div class="profile-info">
                            <span class="name">Administrateur</span>
                            <span class="role">Boutique</span>
                        </div>
                    </div>
                </div>
            </header>

            <div id="view-container" class="view-container">
                <!-- Vue injectée ici -->
            </div>
        </main>
    </div>

    <!-- Templates pour JS -->
    
    <!-- DASHBOARD V2 -->
    <template id="tpl-dashboard">
        <div class="dashboard-view animate-fade-in">
            <div class="stats-grid">
                <!-- Carte 1 -->
                <div class="stat-card glass-panel accent-primary">
                    <div class="stat-icon"><i data-lucide="eye"></i></div>
                    <div class="stat-details">
                        <span class="stat-label">Prescriptions du jour</span>
                        <h3 class="stat-value">24</h3>
                        <span class="stat-trend positive">+8% cette semaine</span>
                    </div>
                </div>
                <!-- Carte 2 -->
                <div class="stat-card glass-panel accent-success">
                    <div class="stat-icon"><i data-lucide="dollar-sign"></i></div>
                    <div class="stat-details">
                        <span class="stat-label">Bénéfice Net</span>
                        <h3 class="stat-value">450 000 FCFA</h3>
                        <span class="stat-trend positive">+15% ce mois</span>
                    </div>
                </div>
                <!-- Carte 3 -->
                <div class="stat-card glass-panel accent-warning">
                    <div class="stat-icon"><i data-lucide="factory"></i></div>
                    <div class="stat-details">
                        <span class="stat-label">Atelier</span>
                        <div style="font-size: 0.85rem; margin-top: 5px; color: var(--text-main);">
                            En cours: <b>14</b> | Prêtes: <b>8</b> | Attente: <b>3</b>
                        </div>
                    </div>
                </div>
                <!-- Carte 4 -->
                <div class="stat-card glass-panel accent-danger">
                    <div class="stat-icon"><i data-lucide="package-minus"></i></div>
                    <div class="stat-details">
                        <span class="stat-label">Stock Faible</span>
                        <div style="font-size: 0.8rem; margin-top: 5px;">
                            <span style="color: var(--accent-danger)">🔴 5 Montures</span><br>
                            <span style="color: var(--accent-warning)">🟠 4 Verres pro</span><br>
                            <span style="color: var(--accent-success)">🟡 3 Lentilles</span>
                        </div>
                        <button class="btn-text" style="font-size: 0.75rem; margin-top: 5px; text-align: left; padding:0;">Voir le détail</button>
                    </div>
                </div>
            </div>

            <!-- Graphiques -->
            <div class="charts-grid mt-4">
                <div class="glass-panel p-4" style="grid-column: span 2;">
                    <h3 class="chart-title">Évolution du chiffre d'affaires</h3>
                    <div style="height: 300px;"><canvas id="revenueChart"></canvas></div>
                </div>
                <div class="glass-panel p-4">
                    <h3 class="chart-title">Produits les plus vendus</h3>
                    <div style="height: 300px; display: flex; justify-content: center;"><canvas id="productsChart"></canvas></div>
                </div>
                <div class="glass-panel p-4" style="grid-column: span 3;">
                    <h3 class="chart-title">Évolution des bénéfices</h3>
                    <div style="height: 250px;"><canvas id="profitChart"></canvas></div>
                </div>
            </div>
        </div>
    </template>

    <!-- VIEWS EXISTANTES RÉENCODÉES (Factures, etc.) -->
    
    <template id="tpl-invoices">
        <div class="invoices-view animate-fade-in">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <div>
                    <h2 style="font-size: 1.5rem; font-weight: 600; color: var(--text-main);">Factures & Devis</h2>
                    <p style="color: var(--text-muted); font-size: 0.9rem;">Gérez l'historique de vos facturations et encaissements.</p>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <button class="btn-outline-sm" style="display: flex; align-items: center; gap: 0.5rem; border: 1px solid var(--accent-primary); color: var(--accent-primary); background: transparent; padding: 0.75rem 1.25rem; border-radius: 8px; cursor: pointer;">
                        <i data-lucide="file-plus" style="width: 18px;"></i> Devis Manuel
                    </button>
                    <button class="btn-primary" onclick="window.appRenderView('sales', 'Point de Vente')" style="display: flex; align-items: center; gap: 0.5rem; background: var(--accent-secondary); border: none; color: white; padding: 0.75rem 1.25rem; border-radius: 8px; cursor: pointer; font-weight: 500;">
                        <i data-lucide="plus" style="width: 18px;"></i> Point de Vente
                    </button>
                </div>
            </header>

            <div class="glass-panel" style="padding: 1.25rem; margin-bottom: 1.5rem; display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;">
                <div class="global-search" style="flex-grow: 1; min-width: 300px; width: auto; background: rgba(0,0,0,0.3); border: 1px solid var(--border-glass);">
                    <i data-lucide="search"></i>
                    <input type="text" placeholder="Chercher par N° ou Client..." style="background: transparent; border: none; color: white; outline: none; padding:0;">
                </div>
                <select style="background: rgba(0,0,0,0.3); border: 1px solid var(--border-glass); color: var(--text-main); padding: 0.6rem 1rem; border-radius: 6px; outline: none;">
                    <option>Tous les statuts</option>
                    <option>Payé</option>
                    <option>Acompte</option>
                    <option>Impayé</option>
                </select>
                <input type="date" style="background: rgba(0,0,0,0.3); border: 1px solid var(--border-glass); color: var(--text-main); padding: 0.5rem 1rem; border-radius: 6px; outline: none; color-scheme: dark;">
            </div>

            <div class="glass-panel" style="overflow-x: auto;">
                <table style="width: 100%; border-collapse: collapse; text-align: left;">
                    <thead>
                        <tr style="border-bottom: 1px solid var(--border-glass);">
                            <th style="padding: 1rem; color: var(--text-muted); font-weight: 500; font-size: 0.85rem;">N° Document</th>
                            <th style="padding: 1rem; color: var(--text-muted); font-weight: 500; font-size: 0.85rem;">Date</th>
                            <th style="padding: 1rem; color: var(--text-muted); font-weight: 500; font-size: 0.85rem;">Client</th>
                            <th style="padding: 1rem; color: var(--text-muted); font-weight: 500; font-size: 0.85rem;">Total</th>
                            <th style="padding: 1rem; color: var(--text-muted); font-weight: 500; font-size: 0.85rem;">Statut</th>
                            <th style="padding: 1rem; text-align: right; color: var(--text-muted); font-weight: 500; font-size: 0.85rem;">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr style="border-bottom: 1px solid rgba(255,255,255,0.02); transition: background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.02)'" onmouseout="this.style.background='transparent'">
                            <td style="padding: 1rem; font-weight: 600; color: var(--accent-secondary);">#FACT-26001</td>
                            <td style="padding: 1rem; font-size: 0.9rem;">22 Juin 2026</td>
                            <td style="padding: 1rem; font-weight: 500;">Mamadou Diop</td>
                            <td style="padding: 1rem; font-weight: 600;">120 000 FCFA</td>
                            <td style="padding: 1rem;"><span class="badge" style="position: static; padding: 4px 10px; background: rgba(16, 185, 129, 0.15); color: var(--accent-success);">Payé</span></td>
                            <td style="padding: 1rem; text-align: right;">
                                <button class="icon-btn" title="Imprimer"><i data-lucide="printer" style="width: 18px;"></i></button>
                                <button class="icon-btn" title="Options"><i data-lucide="more-vertical" style="width: 18px;"></i></button>
                            </td>
                        </tr>
                        <tr style="border-bottom: 1px solid rgba(255,255,255,0.02); transition: background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.02)'" onmouseout="this.style.background='transparent'">
                            <td style="padding: 1rem; font-weight: 600; color: var(--accent-secondary);">#FACT-26002</td>
                            <td style="padding: 1rem; font-size: 0.9rem;">21 Juin 2026</td>
                            <td style="padding: 1rem; font-weight: 500;">Aissatou Sow</td>
                            <td style="padding: 1rem; font-weight: 600;">45 000 FCFA</td>
                            <td style="padding: 1rem;"><span class="badge" style="position: static; padding: 4px 10px; background: rgba(245, 158, 11, 0.15); color: var(--accent-warning);">Acompte</span></td>
                            <td style="padding: 1rem; text-align: right;">
                                <button class="icon-btn" style="color: var(--accent-secondary);" title="Ajouter Paiement"><i data-lucide="dollar-sign" style="width: 18px;"></i></button>
                                <button class="icon-btn" title="Imprimer"><i data-lucide="printer" style="width: 18px;"></i></button>
                            </td>
                        </tr>
                        <tr style="border-bottom: 1px solid rgba(255,255,255,0.02); transition: background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.02)'" onmouseout="this.style.background='transparent'">
                            <td style="padding: 1rem; font-weight: 600; color: var(--accent-primary);">#DEV-0084</td>
                            <td style="padding: 1rem; font-size: 0.9rem;">20 Juin 2026</td>
                            <td style="padding: 1rem; font-weight: 500;">Omar Fall</td>
                            <td style="padding: 1rem; font-weight: 600;">85 000 FCFA</td>
                            <td style="padding: 1rem;"><span class="badge" style="position: static; padding: 4px 10px; background: rgba(255, 255, 255, 0.1); color: var(--text-muted);">Devis</span></td>
                            <td style="padding: 1rem; text-align: right;">
                                <button class="icon-btn" style="color: var(--accent-success);" title="Convertir en Facture"><i data-lucide="check-circle" style="width: 18px;"></i></button>
                                <button class="icon-btn" title="Imprimer"><i data-lucide="printer" style="width: 18px;"></i></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </template>
    <template id="tpl-workshop">
        <div class="animate-fade-in"><h2 class="view-header">Atelier Kanban</h2><p>Sera remplacé par le Drag & Drop à la Phase 4...</p></div>
    </template>

    <template id="tpl-prescriptions">
        <div class="prescriptions-view animate-fade-in">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <div>
                    <h2 style="font-size: 1.5rem; font-weight: 600; color: var(--text-main);">Dossier Médical & Prescriptions</h2>
                    <p style="color: var(--text-muted); font-size: 0.9rem;">Gérez les corrections optiques et les ordonnances clients.</p>
                </div>
                <button class="btn-primary" style="display: flex; align-items: center; gap: 0.5rem; background: var(--accent-secondary); border: none; color: white; padding: 0.75rem 1.25rem; border-radius: 8px; cursor: pointer; font-weight: 500;">
                    <i data-lucide="plus" style="width: 18px;"></i> Nouvelle Ordonnance
                </button>
            </header>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem;">
                <!-- Formulaire de saisie -->
                <div class="glass-panel p-4" style="grid-column: span 2;">
                    <h3 style="margin-bottom: 1.5rem; color: var(--accent-primary); border-bottom: 1px solid var(--border-glass); padding-bottom: 0.5rem;">Saisie d'une Nouvelle Prescription</h3>
                    
                    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 2rem;">
                        <div class="input-group">
                            <label style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 0.5rem; display:block;">Client</label>
                            <select style="width: 100%; padding: 0.75rem; background: rgba(0,0,0,0.2); border: 1px solid var(--border-glass); border-radius: 8px; color: white; outline:none;">
                                <option>Mamadou Diop</option>
                                <option>Aissatou Sow</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 0.5rem; display:block;">Médecin Prescripteur</label>
                            <input type="text" placeholder="Dr. Fall..." style="width: 100%; padding: 0.75rem; background: rgba(0,0,0,0.2); border: 1px solid var(--border-glass); border-radius: 8px; color: white; outline:none;">
                        </div>
                        <div class="input-group">
                            <label style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 0.5rem; display:block;">Date de prescription</label>
                            <input type="date" style="width: 100%; padding: 0.75rem; background: rgba(0,0,0,0.2); border: 1px solid var(--border-glass); border-radius: 8px; color: white; color-scheme: dark; outline:none;">
                        </div>
                        <div class="input-group">
                            <label style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 0.5rem; display:block;">Écart Pupillaire (EP)</label>
                            <input type="text" placeholder="Ex: 62mm" style="width: 100%; padding: 0.75rem; background: rgba(0,0,0,0.2); border: 1px solid var(--border-glass); border-radius: 8px; color: white; outline:none;">
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                        <!-- Oeil Droit -->
                        <div style="background: rgba(59, 130, 246, 0.05); padding: 1.5rem; border-radius: 8px; border: 1px solid rgba(59, 130, 246, 0.2);">
                            <h4 style="color: var(--accent-secondary); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem;"><i data-lucide="eye" style="width: 18px;"></i> Œil Droit (OD)</h4>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                                <div><label style="font-size:0.8rem; color:var(--text-muted);">Sphère (SPH)</label><input type="text" placeholder="+0.00" style="width:100%; padding:0.5rem; background:rgba(0,0,0,0.3); border:1px solid var(--border-glass); color:white; border-radius:4px; text-align:center; outline:none;"></div>
                                <div><label style="font-size:0.8rem; color:var(--text-muted);">Cylindre (CYL)</label><input type="text" placeholder="-0.00" style="width:100%; padding:0.5rem; background:rgba(0,0,0,0.3); border:1px solid var(--border-glass); color:white; border-radius:4px; text-align:center; outline:none;"></div>
                                <div><label style="font-size:0.8rem; color:var(--text-muted);">Axe</label><input type="text" placeholder="180°" style="width:100%; padding:0.5rem; background:rgba(0,0,0,0.3); border:1px solid var(--border-glass); color:white; border-radius:4px; text-align:center; outline:none;"></div>
                                <div><label style="font-size:0.8rem; color:var(--text-muted);">Addition (ADD)</label><input type="text" placeholder="+2.00" style="width:100%; padding:0.5rem; background:rgba(0,0,0,0.3); border:1px solid var(--border-glass); color:white; border-radius:4px; text-align:center; outline:none;"></div>
                            </div>
                        </div>

                        <!-- Oeil Gauche -->
                        <div style="background: rgba(16, 185, 129, 0.05); padding: 1.5rem; border-radius: 8px; border: 1px solid rgba(16, 185, 129, 0.2);">
                            <h4 style="color: var(--accent-success); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem;"><i data-lucide="eye" style="width: 18px;"></i> Œil Gauche (OG)</h4>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                                <div><label style="font-size:0.8rem; color:var(--text-muted);">Sphère (SPH)</label><input type="text" placeholder="+0.00" style="width:100%; padding:0.5rem; background:rgba(0,0,0,0.3); border:1px solid var(--border-glass); color:white; border-radius:4px; text-align:center; outline:none;"></div>
                                <div><label style="font-size:0.8rem; color:var(--text-muted);">Cylindre (CYL)</label><input type="text" placeholder="-0.00" style="width:100%; padding:0.5rem; background:rgba(0,0,0,0.3); border:1px solid var(--border-glass); color:white; border-radius:4px; text-align:center; outline:none;"></div>
                                <div><label style="font-size:0.8rem; color:var(--text-muted);">Axe</label><input type="text" placeholder="180°" style="width:100%; padding:0.5rem; background:rgba(0,0,0,0.3); border:1px solid var(--border-glass); color:white; border-radius:4px; text-align:center; outline:none;"></div>
                                <div><label style="font-size:0.8rem; color:var(--text-muted);">Addition (ADD)</label><input type="text" placeholder="+2.00" style="width:100%; padding:0.5rem; background:rgba(0,0,0,0.3); border:1px solid var(--border-glass); color:white; border-radius:4px; text-align:center; outline:none;"></div>
                            </div>
                        </div>
                    </div>

                    <div style="margin-top: 1.5rem; display: flex; gap: 1rem; align-items: flex-end;">
                        <div style="flex-grow: 1;">
                            <label style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 0.5rem; display:block;">Observations</label>
                            <input type="text" placeholder="Verres progressifs, antireflet..." style="width: 100%; padding: 0.75rem; background: rgba(0,0,0,0.2); border: 1px solid var(--border-glass); border-radius: 8px; color: white; outline:none;">
                        </div>
                        <button class="btn-primary" style="background: var(--accent-primary); border: none; color: white; padding: 0.75rem 2rem; border-radius: 8px; cursor: pointer; font-weight: 600;">Enregistrer</button>
                    </div>
                </div>
            </div>

            <!-- Historique -->
            <div class="glass-panel p-4">
                <h3 style="margin-bottom: 1rem; color: var(--text-main);">Dernières Prescriptions</h3>
                <table style="width: 100%; border-collapse: collapse; text-align: left;">
                    <thead>
                        <tr style="border-bottom: 1px solid var(--border-glass);">
                            <th style="padding: 1rem; color: var(--text-muted); font-weight: 500; font-size: 0.85rem;">Date</th>
                            <th style="padding: 1rem; color: var(--text-muted); font-weight: 500; font-size: 0.85rem;">Client</th>
                            <th style="padding: 1rem; color: var(--text-muted); font-weight: 500; font-size: 0.85rem;">Médecin</th>
                            <th style="padding: 1rem; color: var(--text-muted); font-weight: 500; font-size: 0.85rem;">Résumé OD</th>
                            <th style="padding: 1rem; color: var(--text-muted); font-weight: 500; font-size: 0.85rem;">Résumé OG</th>
                            <th style="padding: 1rem; text-align: right; color: var(--text-muted); font-weight: 500; font-size: 0.85rem;">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr style="border-bottom: 1px solid rgba(255,255,255,0.02); transition: background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.02)'" onmouseout="this.style.background='transparent'">
                            <td style="padding: 1rem; font-size: 0.9rem;">20 Juin 2026</td>
                            <td style="padding: 1rem; font-weight: 600; color: var(--accent-secondary);">Mamadou Diop</td>
                            <td style="padding: 1rem; font-size: 0.9rem;">Dr. Sow</td>
                            <td style="padding: 1rem; font-family: monospace; font-size: 0.85rem;">-1.50 (180)</td>
                            <td style="padding: 1rem; font-family: monospace; font-size: 0.85rem;">-1.25 (175)</td>
                            <td style="padding: 1rem; text-align: right;">
                                <button class="icon-btn" title="Imprimer PDF"><i data-lucide="printer" style="width: 18px;"></i></button>
                                <button class="icon-btn" title="Convertir en Devis"><i data-lucide="shopping-cart" style="width: 18px; color: var(--accent-success);"></i></button>
                            </td>
                        </tr>
                    </tbody>
